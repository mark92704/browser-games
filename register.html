<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    .card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      letter-spacing: 3px;
      color: #e94560;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 2rem;
    }

    .row {
      display: flex;
      gap: 1rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      margin-bottom: 1.2rem;
      flex: 1;
    }

    label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #a8dadc;
      margin-bottom: 0.4rem;
    }

    input {
      background: #0f3460;
      border: 1px solid #1a4a8a;
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      color: #eee;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: #e94560;
      box-shadow: 0 0 0 2px rgba(233,69,96,0.2);
    }

    input.error {
      border-color: #f55;
    }

    .error-msg {
      font-size: 0.72rem;
      color: #f55;
      margin-top: 0.3rem;
      min-height: 1rem;
    }

    .submit-btn {
      width: 100%;
      padding: 0.75rem;
      margin-top: 0.5rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .submit-btn:hover {
      background: #c73652;
      transform: scale(1.02);
    }

    .success {
      display: none;
      text-align: center;
      padding: 1.5rem 0 0.5rem;
    }

    .success .check {
      font-size: 3rem;
      color: #0f9;
    }

    .success p {
      margin-top: 0.8rem;
      color: #a8dadc;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>REGISTER</h1>
    <p class="subtitle">Create your account</p>

    <form id="form" novalidate>
      <div class="row">
        <div class="field">
          <label for="firstname">First Name</label>
          <input type="text" id="firstname" placeholder="Jane" autocomplete="given-name">
          <span class="error-msg" id="err-firstname"></span>
        </div>
        <div class="field">
          <label for="lastname">Last Name</label>
          <input type="text" id="lastname" placeholder="Doe" autocomplete="family-name">
          <span class="error-msg" id="err-lastname"></span>
        </div>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="jane@example.com" autocomplete="email">
        <span class="error-msg" id="err-email"></span>
      </div>

      <div class="field">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" placeholder="(555) 000-0000" autocomplete="tel" maxlength="14">
        <span class="error-msg" id="err-phone"></span>
      </div>

      <button type="submit" class="submit-btn">CREATE ACCOUNT</button>
    </form>

    <div class="success" id="success">
      <div class="check">&#10003;</div>
      <p>Registration complete!<br>Welcome aboard.</p>
    </div>
  </div>

  <script>
    const phoneInput = document.getElementById('phone');
    phoneInput.addEventListener('input', () => {
      let digits = phoneInput.value.replace(/\D/g, '').slice(0, 10);
      if (digits.length <= 3) {
        phoneInput.value = digits.length ? `(${digits}` : '';
      } else if (digits.length <= 6) {
        phoneInput.value = `(${digits.slice(0,3)}) ${digits.slice(3)}`;
      } else {
        phoneInput.value = `(${digits.slice(0,3)}) ${digits.slice(3,6)}-${digits.slice(6)}`;
      }
    });

    function validate(id, test, msg) {
      const el = document.getElementById(id);
      const err = document.getElementById('err-' + id);
      if (!test(el.value.trim())) {
        el.classList.add('error');
        err.textContent = msg;
        return false;
      }
      el.classList.remove('error');
      err.textContent = '';
      return true;
    }

    document.getElementById('form').addEventListener('submit', e => {
      e.preventDefault();
      const ok = [
        validate('firstname', v => v.length >= 2, 'First name is required.'),
        validate('lastname',  v => v.length >= 2, 'Last name is required.'),
        validate('email',     v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v), 'Enter a valid email.'),
        validate('phone',     v => v.replace(/\D/g,'').length === 10, 'Enter a 10-digit phone number.'),
      ];
      if (ok.every(Boolean)) {
        document.getElementById('form').style.display = 'none';
        document.getElementById('success').style.display = 'block';
      }
    });

    ['firstname','lastname','email','phone'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        document.getElementById(id).classList.remove('error');
        document.getElementById('err-' + id).textContent = '';
      });
    });
  </script>
</body>
</html>
